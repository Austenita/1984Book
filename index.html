<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1984 — V2 (Cursor visible)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* CAMBIO CLAVE */
/* ========================= */
html, body{
  cursor:auto; /* 👈 IMPORTANTE */
}

/* ocultamos cursor fake */
.custom-cursor{
  display:none !important;
}

/* ========================= */
/* RESTO IGUAL */
/* ========================= */

body{
  margin:0;
  background:#050505;
  color:#eadfcb;
  font-family:"Inter",sans-serif;
  overflow-x:hidden;
}

/* scanlines */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.03) 0px,
    rgba(255,255,255,.03) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
  animation:scan 6s linear infinite;
}
@keyframes scan{
  to{transform:translateY(6px);}
}

/* ruido */
.overlay-noise{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#fff1 1px,transparent 1px);
  background-size:120px 120px;
  opacity:.05;
}

/* hero */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-family:"Cinzel",serif;
  font-size:6rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  text-shadow:0 0 30px rgba(255,0,0,.2);
}

/* glitch */
.glitch{
  position:relative;
}
.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  opacity:.3;
}
.glitch::before{
  color:red;
  transform:translate(2px,0);
}
.glitch::after{
  color:blue;
  transform:translate(-2px,0);
}

/* reloj */
.clock{
  position:absolute;
  top:20px;
  right:20px;
  font-family:monospace;
  font-size:1.2rem;
  letter-spacing:.2em;
}

/* partículas canvas */
canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* texto */
p{
  color:#aaa;
  max-width:600px;
  margin:auto;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="overlay-noise"></div>

<div class="clock" id="clock"></div>

<section class="hero">
  <div>
    <h1 class="glitch" data-text="1984">1984</h1>
    <p>Te están observando.</p>
  </div>
</section>

<script>

/* ========================= */
/* RELOJ */
/* ========================= */
const clock = document.getElementById("clock");

function updateClock(){
  const now = new Date();
  clock.textContent =
    now.toLocaleTimeString("es-MX");
}
setInterval(updateClock,1000);
updateClock();

/* ========================= */
/* PARTICULAS */
/* ========================= */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*2,
    vy:Math.random()*0.5+0.1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(const p of particles){
    p.y+=p.vy;
    if(p.y>innerHeight) p.y=0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

/* ========================= */
/* AUDIO OPCIONAL */
/* ========================= */
let ctxAudio;

document.body.addEventListener("click",()=>{
  if(ctxAudio) return;

  ctxAudio = new (window.AudioContext||window.webkitAudioContext)();

  const osc = ctxAudio.createOscillator();
  const gain = ctxAudio.createGain();

  osc.type="sine";
  osc.frequency.value=50;

  gain.gain.value=0.02;

  osc.connect(gain);
  gain.connect(ctxAudio.destination);

  osc.start();
});

</script>

</body>
</html>
